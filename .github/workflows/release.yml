name: Build and stage release

on:
  workflow_dispatch:
    inputs:
      image_tag: {description: Immutable image tag, required: true, type: string}
      deploy_staging: {description: Update staging through ArgoCD, required: true, default: false, type: boolean}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  images:
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/proactive-seo-backend:${{ inputs.image_tag }}
          provenance: true
          sbom: true
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/proactive-seo-web:${{ inputs.image_tag }}
          provenance: true
          sbom: true

  staging:
    if: inputs.deploy_staging
    needs: images
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Request ArgoCD staging sync
        env: {ARGOCD_AUTH_TOKEN: "${{ secrets.ARGOCD_AUTH_TOKEN }}", ARGOCD_SERVER: "${{ secrets.ARGOCD_SERVER }}"}
        run: |
          argocd app set proactive-seo --helm-set image.tag=${{ inputs.image_tag }}
          argocd app sync proactive-seo --prune
          argocd app wait proactive-seo --health --timeout 600
