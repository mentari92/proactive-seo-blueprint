name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: {POSTGRES_DB: proactive, POSTGRES_USER: proactive, POSTGRES_PASSWORD: proactive}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U proactive -d proactive"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      APP_ENV: test
      APP_DATABASE_URL: postgresql+asyncpg://proactive:proactive@localhost:5432/proactive
      TEST_DATABASE_URL: postgresql+asyncpg://proactive:proactive@localhost:5432/proactive
      APP_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with: {enable-cache: true}
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy packages/proactive_core/proactive_core
      - run: uvx pip-audit --local
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov --cov-report=xml --cov-fail-under=70
      - name: Verify downgrade and re-upgrade
        run: uv run alembic downgrade base && uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: "20", cache: pnpm}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web typecheck
      - run: pnpm --dir apps/web test
      - run: pnpm audit --prod --audit-level moderate
      - run: pnpm --dir apps/web build
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm --dir apps/web test:e2e

  contracts-and-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with: {terraform_version: "1.15.5"}
      - uses: azure/setup-helm@v4
      - run: docker compose --profile full config --quiet
      - run: helm lint infrastructure/kubernetes/chart
      - run: helm template proactive-seo infrastructure/kubernetes/chart > /tmp/proactive-seo.yaml
      - run: terraform -chdir=infrastructure/terraform fmt -check -recursive
      - run: terraform -chdir=infrastructure/terraform init -backend=false
      - run: terraform -chdir=infrastructure/terraform validate

  codeql:
    runs-on: ubuntu-latest
    permissions: {contents: read, security-events: write}
    strategy: {matrix: {language: [python, javascript-typescript]}}
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with: {languages: "${{ matrix.language }}"}
      - uses: github/codeql-action/analyze@v4

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with: {context: ., push: false, load: true, tags: proactive-seo-backend:test, cache-from: type=gha, cache-to: "type=gha,mode=max"}
      - uses: docker/build-push-action@v7
        with: {context: ., file: apps/web/Dockerfile, push: false, load: true, tags: proactive-seo-web:test, cache-from: type=gha, cache-to: "type=gha,mode=max"}
      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with: {image-ref: proactive-seo-backend:test, format: table, exit-code: "1", ignore-unfixed: true, severity: CRITICAL,HIGH}
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with: {image-ref: proactive-seo-web:test, format: table, exit-code: "1", ignore-unfixed: true, severity: CRITICAL,HIGH, skip-setup-trivy: true}
